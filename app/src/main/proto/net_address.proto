syntax = "proto3";

package xray.common.net;

option java_package = "com.xray.common.net";
option java_multiple_files = true;

// Minimal subset of xray-core/common/net/address.proto.
// Field numbers match xray-core exactly so that serialised bytes are compatible.

message IPOrDomain {
  oneof address {
    bytes ip = 1;
    string domain = 2;
  }
}
