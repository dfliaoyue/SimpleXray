syntax = "proto3";

package xray.app.proxyman;

option java_package = "com.xray.app.proxyman";
option java_multiple_files = true;

// Minimal subset of xray-core/app/proxyman/config.proto.
// Field numbers match xray-core exactly so that serialised bytes are compatible.

message PortRange {
    uint32 From = 1;
    uint32 To = 2;
}

message PortList {
    repeated PortRange range = 1;
}

message ReceiverConfig {
    PortList port_range = 1;
}
