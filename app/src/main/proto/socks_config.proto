syntax = "proto3";

package xray.proxy.socks;

option java_package = "com.xray.proxy.socks";
option java_multiple_files = true;

// Minimal subset of xray-core/proxy/socks/config.proto.
// Field numbers match xray-core exactly so that serialised bytes are compatible.

enum AuthType {
    NO_AUTH = 0;
    PASSWORD = 1;
}

message Account {
    string username = 1;
    string password = 2;
}

message ServerConfig {
    AuthType auth_type = 1;
    repeated Account accounts = 2;
}
