syntax = "proto3";

package xray.core;

option java_package = "com.xray.core";
option java_multiple_files = true;

import "typed_message.proto";

// Minimal subset of xray-core/core/config.proto needed for AddInbound.
// Field numbers match xray-core exactly so that serialised bytes are compatible.
message InboundHandlerConfig {
    string tag = 1;
    xray.common.serial.TypedMessage receiver_settings = 2;
    xray.common.serial.TypedMessage proxy_settings = 3;
}
