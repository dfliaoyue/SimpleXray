syntax = "proto3";

package xray.common.serial;

option java_package = "com.xray.common.serial";
option java_multiple_files = true;

// Mirrors xray-core/common/serial/typed_message.proto exactly.
// Field numbers must match xray-core so that serialised bytes are compatible.

message TypedMessage {
    // The full proto message type name (e.g. "xray.proxy.socks.ServerConfig").
    string type = 1;
    // Serialised proto message bytes.
    bytes value = 2;
}
